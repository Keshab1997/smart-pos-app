
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Print Bill - Smart POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="print.css">
</head>
<body>
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="page-wrapper">
        <div class="print-actions no-print">
            <button class="btn-print" onclick="window.print()">🖨️ Print Bill</button>
            <button id="whatsapp-share-btn" class="btn-share">💬 Share on WhatsApp</button>
            <button class="btn-close" onclick="window.close()">✖ Close</button>
        </div>

        <div class="receipt">
        <!-- দোকানের তথ্য -->
        <header id="shop-details-container" class="shop-header">
            <!-- জাভাস্ক্রিপ্ট এখানে দোকানের তথ্য লোড করবে -->
            <h1 class="shop-name">Loading Shop Details...</h1>
        </header>
        
        <div class="invoice-title-container">
            <h2 id="invoice-type-title">RETAIL INVOICE</h2>
        </div>

        <!-- বিলের প্রাথমিক তথ্য -->
        <section class="bill-info">
            <div><strong>Bill No:</strong> <span id="bill-no">N/A</span></div>
            <div><strong>Date:</strong> <span id="bill-date">N/A</span></div>
        </section>

        <!-- কাস্টমার ডিটেইলস -->
        <section class="customer-details" id="customer-details-container" style="display: none;">
            <p><strong>To:</strong> <span id="customer-name"></span></p>
            <p id="customer-phone-p" style="display: none;"><strong>Phone:</strong> <span id="customer-phone"></span></p>
            <p id="customer-address-p" style="display: none;"><strong>Address:</strong> <span id="customer-address"></span></p>
        </section>
        
        <!-- আইটেমের তালিকা -->
        <table class="items-table">
            <thead>
                <tr>
                    <th class="item-col">Item</th>
                    <th class="qty-col">Qty</th>
                    <th class="rate-col">Rate</th>
                    <th class="total-col">Total</th>
                </tr>
            </thead>
            <tbody id="receipt-items">
                <!-- আইটেমগুলো এখানে লোড হবে -->
            </tbody>
        </table>

        <!-- আইটেম সামারি -->
        <div class="items-summary-line">
            <span>Total Items: <span id="total-items-count">0</span></span>
            <span>Total Qty: <span id="total-items-qty">0</span></span>
        </div>

        <!-- মোট টাকার হিসাব -->
        <section class="totals-section">
            <div class="summary-line">
                <span>Subtotal</span>
                <span id="receipt-subtotal"></span>
            </div>
            
            <!-- জিএসটি ব্রেকডাউন -->
            <div id="gst-details-area" style="display: none;">
                <div class="summary-line">
                    <span>CGST (<span id="cgst-rate-print"></span>%)</span>
                    <span id="receipt-cgst"></span>
                </div>
                <div class="summary-line">
                    <span>SGST (<span id="sgst-rate-print"></span>%)</span>
                    <span id="receipt-sgst"></span>
                </div>
            </div>

            <div class="summary-line" id="discount-line" style="display: none;">
                <span>Discount</span>
                <span id="receipt-discount"></span>
            </div>

            <div class="summary-line" id="advance-line" style="display: none;">
                <span>Advance Adjusted</span>
                <span id="receipt-advance"></span>
            </div>

            <hr class="separator">
            <div class="summary-line grand-total">
                <strong>Net Payable</strong>
                <strong id="receipt-total"></strong>
            </div>
        </section>

        <!-- পেমেন্টের বিস্তারিত -->
        <section class="payment-details">
            <div class="summary-line">
                <strong>Payment Mode:</strong>
                <span id="payment-method"></span>
            </div>
            
            <!-- পেমেন্ট ব্রেকডাউন (ডাইনামিক্যালি লোড হবে) -->
            <div id="payment-breakdown-area" class="payment-breakdown">
                <!-- JavaScript will fill this -->
            </div>
        </section>

        <!-- ফুটার -->
        <footer class="receipt-footer">
            <!-- দোকানের কাস্টম ফুটার নোট এখানে লোড হবে -->
            <p id="receipt-footer-note">Thank you for your purchase!</p>
            <p class="powered-by">Powered by Smart POS</p>
        </footer>
    </div><!-- /.receipt -->
    </div><!-- /.page-wrapper -->

    <!-- Firebase SDK স্ক্রিপ্ট -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
      }
    }
    </script>
    
    <!-- কাস্টম জাভাস্ক্রিপ্ট ফাইল -->
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="print.js"></script>

</body>
</html>
