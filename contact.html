<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Smart POS</title>
    <link rel="stylesheet" href="css/login.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .contact-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .contact-header h1 {
            color: #4361ee;
            margin-bottom: 10px;
        }
        .contact-info {
            margin: 20px 0;
        }
        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #4361ee;
        }
        .contact-item span {
            font-size: 24px;
            margin-right: 15px;
        }
        .contact-item div {
            flex: 1;
        }
        .contact-item strong {
            display: block;
            color: #334155;
            margin-bottom: 5px;
        }
        .contact-item p {
            margin: 0;
            color: #64748b;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4361ee;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <div class="contact-header">
            <h1>📞 Contact Us</h1>
            <p>Get in touch with us</p>
        </div>
        
        <div class="contact-info">
            <div class="contact-item">
                <span>👤</span>
                <div>
                    <strong>Developer</strong>
                    <p>Keshab Sarkar</p>
                </div>
            </div>
            
            <div class="contact-item">
                <span>📱</span>
                <div>
                    <strong>Phone</strong>
                    <p><a href="tel:9382284190" style="color: #4361ee; text-decoration: none;">9382284190</a></p>
                </div>
            </div>
            
            <div class="contact-item">
                <span>📍</span>
                <div>
                    <strong>Address</strong>
                    <p>Simla Mertala<br>Purba Bardhaman, West Bengal<br>PIN: 713513</p>
                </div>
            </div>
            
            <div class="contact-item">
                <span>🔒</span>
                <div>
                    <strong>Support</strong>
                    <p>For technical support, please contact the developer directly</p>
                </div>
            </div>
        </div>
        
        <a href="index.html" class="back-btn">← Back to Login</a>
    </div>
</body>
</html>
