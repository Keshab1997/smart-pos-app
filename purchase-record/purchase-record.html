<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:," />
    <title>Purchase Note Record</title>
    <!-- তোমার মেইন CSS ফাইল থাকলে এখানে লিঙ্ক করতে পারো, না হলে নিচের CSS কাজ করবে -->
    <link rel="stylesheet" href="purchase-record.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/global.css">
    <!-- আইকনের জন্য -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="main-content-area">
        <div class="container">
            
            <!-- পেজ হেডার এবং ড্যাশবোর্ড বাটন -->
            <div class="page-header">
                <div>
                    <h2>📝 Purchase Note Entry</h2>
                    <p class="subtitle">Isolated Record (Not linked to Main Accounts)</p>
                </div>
                <a href="purchase-dashboard.html" class="btn btn-outline">
                    <i class="fas fa-list"></i> View Records List
                </a>
            </div>
            
            <!-- বিলের তথ্য -->
            <div class="bill-meta-box">
                <div class="form-group">
                    <label>Date (তারিখ):</label>
                    <input type="date" id="billDate">
                </div>
                <div class="form-group" style="flex-grow: 1;">
                    <label>Supplier / Bill Name (নাম):</label>
                    <input type="text" id="billName" placeholder="দোকান বা সাপ্লায়ায়ের নাম লিখুন...">
                </div>
            </div>

            <!-- এক্সেল স্টাইল টেবিল -->
            <div class="table-responsive">
                <table id="excelTable">
                    <thead>
                        <tr>
                            <th width="5%">No.</th>
                            <th width="45%">Item Name (পণ্যের নাম)</th>
                            <th width="20%">Qty / Unit (পরিমাণ)</th>
                            <th width="15%">Unit Price (₹)</th>
                            <th width="15%">Line Total (₹)</th>
                            <th width="5%">❌</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- জাভাস্ক্রিপ্ট দিয়ে এখানে রো তৈরি হবে -->
                    </tbody>
                </table>
            </div>

            <!-- ফুটার অ্যাকশন -->
            <div class="footer-actions">
                <button id="addRowBtn" class="btn btn-blue">
                    <i class="fas fa-plus"></i> Add Row
                </button>
                <button id="clearAllBtn" class="btn btn-outline" type="button">
                    <i class="fas fa-trash"></i> Clear All
                </button>
                
                <div class="total-display">
                    Total: <span id="grandTotal">0.00</span> ₹
                </div>

                <button id="saveBtn" class="btn btn-green">
                    <i class="fas fa-save"></i> SAVE RECORD
                </button>
            </div>

            <!-- ================= AI ASSIST (Prompt + Auto-fill) ================= -->
            <div class="ai-assist">
                <div class="ai-top-row">
                    <button id="selectBillImageBtn" class="btn btn-outline" type="button">
                        <i class="fas fa-image"></i> Select Bill Image
                    </button>
                    <button id="openAiStudioBtn" class="btn btn-purple" type="button">
                        <i class="fas fa-wand-magic-sparkles"></i> Open AI Studio
                    </button>
                </div>

                <input type="file" id="billImageInput" accept="image/*" style="display:none;">
                <div class="ai-preview">
                    <img id="billImagePreview" alt="Selected bill preview" style="display:none;">
                </div>

                <div class="ai-field">
                    <div class="ai-label-row">
                        <label for="aiPromptBox">Prompt (copy + paste to AI studio)</label>
                        <button id="copyAiPromptBtn" class="btn btn-outline btn-sm" type="button">
                            <i class="fas fa-copy"></i> Copy Prompt
                        </button>
                    </div>
                    <textarea id="aiPromptBox" readonly></textarea>
                    <div class="ai-hint">
                        AI studio খুলবে, promptটা কপি হয়ে যাবে। একই ছবি AI studio তে upload করে দিন।
                    </div>
                </div>

                <div class="ai-field">
                    <label for="aiOutputJson">Paste AI output JSON here</label>
                    <textarea id="aiOutputJson" placeholder='{"billName":"...","date":"YYYY-MM-DD","items":[{"itemName":"...","itemQty":1,"itemUnit":"pcs","unitPrice":10.5}]}'></textarea>
                </div>

                <button id="applyAiOutputBtn" class="btn btn-green" type="button">
                    <i class="fas fa-magic"></i> Auto-fill From JSON
                </button>

                <div id="aiAssistStatus" class="ai-status"></div>
            </div>
        </div>
    </div>

    <!-- ================= UNIT SUGGESTION LIST (Comprehensive) ================= -->
    <datalist id="unitOptions">
        <!-- সাধারণ একক -->
        <option value="pcs">
        <option value="pic">
        <option value="set">
        <option value="box">
        <option value="packet">
        <option value="bag">
        <option value="bosta">
        <option value="carton">
        <option value="dozon">
        <option value="pair">
        
        <!-- ওজন -->
        <option value="kg">
        <option value="gram">
        <option value="mg">
        <option value="ton">
        <option value="mon">
        <option value="quintal">
        
        <!-- দৈর্ঘ্য -->
        <option value="mtr">
        <option value="cm">
        <option value="inch">
        <option value="feet">
        <option value="yard">
        <option value="goj">
        <option value="km">
        <option value="rashi">
        <option value="than">
        
        <!-- তরল -->
        <option value="liter">
        <option value="ml">
        <option value="galon">
    </datalist>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/navbar.js"></script>
    
    <!-- Logout Logic -->
    <script type="module">
        import { auth } from '../js/firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        document.addEventListener('trigger-logout', () => {
            signOut(auth).then(() => {
                window.location.href = '../index.html';
            }).catch((error) => {
                console.error("Logout error", error);
            });
        });
    </script>
    
    <script type="module" src="purchase-record.js"></script>
</body>
</html>
