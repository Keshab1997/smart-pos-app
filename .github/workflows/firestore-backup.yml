name: Firestore Backup

# Workflow permissions
permissions:
  contents: write

on:
  schedule:
    # প্রতি রবিবার রাত 2:00 AM UTC (ভারতীয় সময় 7:30 AM) - Weekly backup
    - cron: '0 2 * * 0'
  
  # Manual trigger option
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: |
          npm install firebase-admin
      
      - name: Create Backup Script
        run: |
          cat > backup.js << 'EOF'
          const admin = require('firebase-admin');
          const fs = require('fs');
          const path = require('path');

          // Firebase Admin SDK initialization
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });

          const db = admin.firestore();

          // Batch processing to avoid quota limits
          async function batchGet(collectionRef, batchSize = 100) {
            const allDocs = [];
            let lastDoc = null;
            
            while (true) {
              let query = collectionRef.limit(batchSize);
              if (lastDoc) query = query.startAfter(lastDoc);
              
              const snapshot = await query.get();
              if (snapshot.empty) break;
              
              snapshot.forEach(doc => allDocs.push({ id: doc.id, data: doc.data() }));
              lastDoc = snapshot.docs[snapshot.docs.length - 1];
              
              // Add delay to avoid rate limiting
              await new Promise(resolve => setTimeout(resolve, 500));
              
              if (snapshot.docs.length < batchSize) break;
            }
            
            return allDocs;
          }

          async function backupFirestore() {
            const timestamp = new Date().toISOString().split('T')[0];
            const backupDir = path.join('backups', timestamp);
            
            if (!fs.existsSync(backupDir)) {
              fs.mkdirSync(backupDir, { recursive: true });
            }

            console.log('🔄 Starting Firestore backup with rate limiting...');

            try {
              const shopsSnapshot = await db.collection('shops').get();
              const shopsData = {};

              for (const shopDoc of shopsSnapshot.docs) {
                const shopId = shopDoc.id;
                const shopData = shopDoc.data();
                
                console.log(`📦 Backing up shop: ${shopId}`);
                
                shopsData[shopId] = {
                  ...shopData,
                  inventory: {},
                  expenses: {},
                  sales: {},
                  inventory_logs: {}
                };

                // Backup inventory with batching
                console.log('  📦 Backing up inventory...');
                const inventoryDocs = await batchGet(
                  db.collection('shops').doc(shopId).collection('inventory')
                );
                inventoryDocs.forEach(doc => {
                  shopsData[shopId].inventory[doc.id] = doc.data;
                });

                // Backup expenses with batching
                console.log('  💰 Backing up expenses...');
                const expensesDocs = await batchGet(
                  db.collection('shops').doc(shopId).collection('expenses')
                );
                expensesDocs.forEach(doc => {
                  shopsData[shopId].expenses[doc.id] = doc.data;
                });

                // Backup sales with batching
                console.log('  🛒 Backing up sales...');
                const salesDocs = await batchGet(
                  db.collection('shops').doc(shopId).collection('sales')
                );
                salesDocs.forEach(doc => {
                  shopsData[shopId].sales[doc.id] = doc.data;
                });

                // Backup inventory logs with batching (last 1000 only)
                console.log('  📋 Backing up logs (last 1000)...');
                const logsSnapshot = await db.collection('shops').doc(shopId)
                  .collection('inventory_logs')
                  .orderBy('timestamp', 'desc')
                  .limit(1000)
                  .get();
                logsSnapshot.forEach(doc => {
                  shopsData[shopId].inventory_logs[doc.id] = doc.data();
                });
                
                // Delay between shops
                await new Promise(resolve => setTimeout(resolve, 1000));
              }

              // Save to JSON file
              const backupFile = path.join(backupDir, 'firestore-backup.json');
              fs.writeFileSync(backupFile, JSON.stringify(shopsData, null, 2));

              // Create summary
              const summary = {
                timestamp: new Date().toISOString(),
                shops: Object.keys(shopsData).length,
                totalInventory: Object.values(shopsData).reduce((sum, shop) => sum + Object.keys(shop.inventory).length, 0),
                totalExpenses: Object.values(shopsData).reduce((sum, shop) => sum + Object.keys(shop.expenses).length, 0),
                totalSales: Object.values(shopsData).reduce((sum, shop) => sum + Object.keys(shop.sales).length, 0),
                totalLogs: Object.values(shopsData).reduce((sum, shop) => sum + Object.keys(shop.inventory_logs).length, 0)
              };

              const summaryFile = path.join(backupDir, 'summary.json');
              fs.writeFileSync(summaryFile, JSON.stringify(summary, null, 2));

              console.log('✅ Backup completed successfully!');
              console.log(`📊 Summary: ${summary.shops} shops, ${summary.totalInventory} products, ${summary.totalSales} sales`);

              return summary;
            } catch (error) {
              console.error('❌ Backup failed:', error);
              throw error;
            }
          }

          backupFirestore()
            .then(() => process.exit(0))
            .catch(err => {
              console.error(err);
              process.exit(1);
            });
          EOF
      
      - name: Run Backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node backup.js
      
      - name: Commit and Push Backup
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add backups/
          if ! git diff --staged --quiet; then
            git commit -m "🔄 Automated Firestore backup - $(date +'%Y-%m-%d %H:%M:%S')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
      
      - name: Cleanup Old Backups (Keep last 30 days)
        run: |
          if [ -d "backups" ]; then
            cd backups
            # Keep last 30 directories (sorted by date)
            ls -t | tail -n +31 | xargs -r rm -rf
            cd ..
            git add backups/
            if ! git diff --staged --quiet; then
              git commit -m "🗑️ Cleanup old backups"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            fi
          fi
